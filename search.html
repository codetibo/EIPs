<style type="text/css">
  .eip-search-page {
    margin-top: 24px;
  }

  .eip-search-page__input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    margin-bottom: 28px;
  }

  .eip-search-page__input-wrapper .eip-search__icon {
    position: absolute;
    left: 14px;
    width: 20px;
    height: 20px;
    color: #888;
    pointer-events: none;
    flex-shrink: 0;
  }

  .eip-search-page__input {
    width: 100%;
    padding: 14px 18px 14px 44px;
    font-size: 1.1rem;
    line-height: 1.5;
    border: 2px solid #ccc;
    border-radius: 10px;
    background: #fff;
    color: #333;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .eip-search-page__input::placeholder {
    color: #aaa;
  }

  .eip-search-page__input:focus {
    border-color: #726E97;
    box-shadow: 0 0 0 4px rgba(114, 110, 151, 0.15);
  }

  .eip-search-page__header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e8e8e8;
  }

  .eip-search-page__count {
    font-size: 0.95rem;
    color: #555;
  }

  .eip-search-page__range {
    font-size: 0.82rem;
    color: #999;
  }

  .eip-search-page #eip-search-page-results .eip-search__result {
    padding: 14px 18px;
    border: 1px solid #eee;
    border-radius: 8px;
    margin-bottom: 8px;
  }

  .eip-search-page #eip-search-page-results .eip-search__result:hover {
    border-color: #d4d0eb;
    background: #faf8ff;
  }

  /* Pagination */
  .eip-search-page__pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 28px;
    padding: 16px 0;
    flex-wrap: wrap;
  }

  .eip-search-page__page-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 38px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 500;
    color: #555;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
    line-height: 1.3;
  }

  .eip-search-page__page-btn:hover {
    background: #e8e4f5;
    border-color: #c8c0e0;
    color: #333;
  }

  .eip-search-page__page-btn--active {
    background: #726E97;
    border-color: #726E97;
    color: #fff;
    font-weight: 600;
  }

  .eip-search-page__page-btn--active:hover {
    background: #5f5b80;
    border-color: #5f5b80;
    color: #fff;
  }

  .eip-search-page__page-btn--disabled {
    opacity: 0.4;
    cursor: default;
    pointer-events: none;
  }

  .eip-search-page__page-dots {
    padding: 0 4px;
    color: #999;
    font-size: 0.85rem;
    letter-spacing: 2px;
  }

    .eip-search-page__count { color: #999; }

      border-color: #3a3a3a;

      color: #e0e0e0;

      background: #726E97;
      border-color: #726E97;
      color: #fff;
    }
    .eip-search-page__page-btn--disabled { color: #555; }
    .eip-search-page__page-dots { color: #666; }
  }

  .eip-search-page__filters {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e8e8e8;
  }

  .eip-search-page__filters--type {
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 2px solid #e0e0e0;

  .eip-search-page__filter-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: #888;
    margin-right: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .eip-search-page__filter-chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    font-size: 0.78rem;
    font-weight: 500;
    color: #666;
    background: #f0f0f0;
    border: 1px solid #ddd;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
    line-height: 1.4;
  }

  .eip-search-page__filter-chip:hover {
    background: #e8e4f5;
    border-color: #c8c0e0;
    color: #444;
  }

  .eip-search-page__filter-chip--active {
    background: #726E97;
    border-color: #726E97;
    color: #fff;
    font-weight: 600;
  }

  .eip-search-page__filter-chip--active:hover {
    background: #5f5b80;
    border-color: #5f5b80;
    color: #fff;
  }

  .eip-search-page__filter-chip--clear {

    border-color: #ccc;
    color: #999;
    font-size: 0.75rem;
    padding: 4px 10px;

  .eip-search-page__filter-chip--clear:hover {
    background: #f0edf7;
    border-color: #c8c0e0;
    color: #726E97;
  }

  .eip-search-page__filter-chip--clear-all {
    background: transparent;
    border-color: #e0c8c8;
    color: #c77;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px 16px;
  }

  .eip-search-page__filter-chip--clear-all:hover {
    background: #fff0f0;
    border-color: #d99;
    color: #b33;
  }

  .eip-search-page__filters--clear-all {
    justify-content: center;
    padding-bottom: 6px;
    margin-bottom: 20px;
    border-bottom: 2px solid #f5e8e8;
  }
