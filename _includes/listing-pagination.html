<script>
  document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('eip-listing-container');
    var controlsEl = document.getElementById('eip-listing-pagination');
    if (!container || !controlsEl) return;

    var params = new URLSearchParams(window.location.search);
    var batchSize = parseInt(params.get('per_page'), 10) || 25;
    var validSizes = [25, 50, 100];
    if (validSizes.indexOf(batchSize) === -1) batchSize = 25;

    var allRows = container.querySelectorAll('.eip-row');
    var totalRows = allRows.length;
    var loadedCount = 0;
    var isLoading = false;
    var isComplete = false;
    var observer = null;

    // Hide all rows initially using CSS class (preserves flex display)
    for (var i = 0; i < allRows.length; i++) {
      allRows[i].classList.add('eip-row--hidden');
    }

    function showRows(start, count) {
      var end = Math.min(start + count, totalRows);
      for (var i = start; i < end; i++) {
        allRows[i].classList.remove('eip-row--hidden');
      }
      loadedCount = end;
      updateCounter();

      // Handle section headers — hide sections with no visible rows
      var sections = container.querySelectorAll('.eip-status-section');
      var rowIndex = 0;
      for (var s = 0; s < sections.length; s++) {
        var sectionRows = sections[s].querySelectorAll('.eip-row');
        var anyVisible = false;
        for (var r = 0; r < sectionRows.length; r++) {
          if (rowIndex < loadedCount) {
            anyVisible = true;
          }
          rowIndex++;
        }
        sections[s].classList.toggle('eip-section--hidden', !anyVisible);
      }

      if (loadedCount >= totalRows) {
        isComplete = true;
        showComplete();
      }
    }

    function loadNextBatch() {
      if (isLoading || isComplete) return;
      isLoading = true;
      showLoader();

      // Use requestAnimationFrame for smooth reveal
      requestAnimationFrame(function() {
        showRows(loadedCount, batchSize);

        // If after loading we still haven't filled the viewport, load more
        var sentinel = document.getElementById('eip-infinite-sentinel');
        if (sentinel && !isComplete) {
          var sentinelRect = sentinel.getBoundingClientRect();
          if (sentinelRect.top < window.innerHeight + 200) {
            // Still need more to fill the viewport
            isLoading = false;
            loadNextBatch();
            return;
          }
        }

        isLoading = false;
        hideLoader();
      });
    }

    function resetInfinite() {
      // Hide all rows using CSS class
      for (var i = 0; i < allRows.length; i++) {
        allRows[i].classList.add('eip-row--hidden');
      }
      loadedCount = 0;
      isComplete = false;

      // Hide all section headers
      var sections = container.querySelectorAll('.eip-status-section');
      for (var s = 0; s < sections.length; s++) {
        sections[s].classList.add('eip-section--hidden');
      }

      showRows(0, batchSize);
      updateUrl();

      // After first batch, check if more are needed to fill viewport
      requestAnimationFrame(function() {
        var sentinel = document.getElementById('eip-infinite-sentinel');
        if (sentinel && !isComplete) {
          var sentinelRect = sentinel.getBoundingClientRect();
          if (sentinelRect.top < window.innerHeight + 200) {
            loadNextBatch();
          }
        }
      });
    }

    function setupObserver() {
      var sentinel = document.getElementById('eip-infinite-sentinel');
      if (!sentinel) return;

      if (observer) observer.disconnect();

      observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting && !isLoading && !isComplete) {
            loadNextBatch();
          }
        });
      }, { rootMargin: '200px' });

      observer.observe(sentinel);
    }

    function renderControls() {
      var html = '';

      // Counter showing how many are loaded
      html += '<span class="eip-infinite__counter" id="eip-infinite-counter">Showing 0 of ' + totalRows + '</span>';

      // Page size selector
      html += '<span class="eip-infinite__size-label">per page:</span>';
      html += '<select class="eip-infinite__size-select" aria-label="Batch size">';
      for (var si = 0; si < validSizes.length; si++) {
        var v = validSizes[si];
        html += '<option value="' + v + '"' + (v === batchSize ? ' selected' : '') + '>' + v + '</option>';
      }
      html += '</select>';

      controlsEl.innerHTML = html;

      // Page size select handler
      var sizeSelect = controlsEl.querySelector('.eip-infinite__size-select');
      if (sizeSelect) {
        sizeSelect.addEventListener('change', function() {
          batchSize = parseInt(this.value, 10);
          resetInfinite();
        });
      }
    }

    function updateCounter() {
      var counter = document.getElementById('eip-infinite-counter');
      if (counter) {
        counter.textContent = 'Showing ' + loadedCount + ' of ' + totalRows;
      }
      updateLoadMoreCount();
      updateGoTop();
    }

    function updateUrl() {
      var url = new URL(window.location);
      if (batchSize !== 25) {
        url.searchParams.set('per_page', batchSize);
      } else {
        url.searchParams.delete('per_page');
      }
      window.history.replaceState({ perPage: batchSize }, '', url.toString());
    }

    // Build skeleton cards HTML (shows ~5 or the batch size, whichever is smaller)
    var skeletonCount = Math.min(batchSize, 5);
    function buildSkeletons(count) {
      var html = '';
      for (var sk = 0; sk < count; sk++) {
        html += '<div class="eip-skeleton">' +
          '<div class="eip-skeleton__number"></div>' +
          '<div class="eip-skeleton__title"></div>' +
          '<div class="eip-skeleton__status"></div>' +
          '</div>';
      }
      return html;
    }

    // Sentinel element for intersection observer
    var sentinel = document.createElement('div');
    sentinel.id = 'eip-infinite-sentinel';
    sentinel.className = 'eip-infinite__sentinel';
    sentinel.innerHTML = '' +
      '<div class="eip-infinite__skeletons" id="eip-infinite-skeletons">' + buildSkeletons(skeletonCount) + '</div>' +
      '<div class="eip-infinite__loader"><span class="eip-infinite__spinner"></span> Loading more...</div>' +
      '<button class="eip-infinite__load-more" id="eip-load-more-btn">Load more <span class="eip-infinite__load-more-count" id="eip-load-more-count"></span></button>' +
      '<button class="eip-infinite__go-top" id="eip-infinite-go-top">&#8593; Back to top</button>' +
      '<div class="eip-infinite__complete">&#10003; All ' + totalRows + ' EIPs loaded</div>';
    controlsEl.parentNode.insertBefore(sentinel, controlsEl.nextSibling);

    // Update remaining count on the load-more button
    function updateLoadMoreCount() {
      var countEl = document.getElementById('eip-load-more-count');
      var btn = document.getElementById('eip-load-more-btn');
      if (!countEl || !btn) return;
      var remaining = totalRows - loadedCount;
      if (remaining > 0 && !isComplete) {
        countEl.textContent = '(' + remaining + ' more)';
        countEl.style.display = '';
        btn.style.display = '';
      } else {
        btn.style.display = 'none';
      }
    }

    // Bind click handler for the load-more button
    function setupLoadMoreButton() {
      var btn = document.getElementById('eip-load-more-btn');
      if (btn) {
        btn.addEventListener('click', function() {
          loadNextBatch();
        });
      }

      // Bind click handler for go-top button
      var goTop = document.getElementById('eip-infinite-go-top');
      if (goTop) {
        goTop.addEventListener('click', function() {
          container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }
    }

    // Show or hide the go-top button based on how much has been loaded
    function updateGoTop() {
      var goTop = document.getElementById('eip-infinite-go-top');
      if (!goTop) return;
      // Show after at least 2 batches worth of rows have been loaded
      if (loadedCount > batchSize * 2 && !isComplete) {
        goTop.style.display = '';
      } else {
        goTop.style.display = 'none';
      }
    }

    // Show loader function — shows skeleton cards + spinner, hides buttons
    function showLoader() {
      var skeletons = document.getElementById('eip-infinite-skeletons');
      var loader = sentinel.querySelector('.eip-infinite__loader');
      var btn = document.getElementById('eip-load-more-btn');
      var goTop = document.getElementById('eip-infinite-go-top');
      if (skeletons) skeletons.style.display = '';
      if (loader) loader.style.display = '';
      if (btn) btn.style.display = 'none';
      if (goTop) goTop.style.display = 'none';
    }

    function hideLoader() {
      var skeletons = document.getElementById('eip-infinite-skeletons');
      var loader = sentinel.querySelector('.eip-infinite__loader');
      if (skeletons) skeletons.style.display = 'none';
      if (loader && !isComplete) loader.style.display = 'none';
      // Show the load-more button again after loading finishes, if there's more
      if (!isComplete) {
        updateLoadMoreCount();
      }
    }

    function showComplete() {
      var loader = sentinel.querySelector('.eip-infinite__loader');
      var btn = document.getElementById('eip-load-more-btn');
      var goTop = document.getElementById('eip-infinite-go-top');
      var complete = sentinel.querySelector('.eip-infinite__complete');
      if (loader) loader.style.display = 'none';
      if (btn) btn.style.display = 'none';
      if (goTop) goTop.style.display = 'none';
      if (complete) complete.style.display = '';
    }

    renderControls();
    setupLoadMoreButton();
    resetInfinite();
    setupObserver();

    // Listen for scroll events to fill viewport
    var scrollTimer = null;
    window.addEventListener('scroll', function() {
      if (scrollTimer) clearTimeout(scrollTimer);
      scrollTimer = setTimeout(function() {
        if (!isComplete && !isLoading) {
          var sentinelEl = document.getElementById('eip-infinite-sentinel');
          if (sentinelEl) {
            var rect = sentinelEl.getBoundingClientRect();
            if (rect.top < window.innerHeight + 400) {
              loadNextBatch();
            }
          }
        }
      }, 100);
    }, { passive: true });

    // Handle initial load — fill viewport
    requestAnimationFrame(function fillViewport() {
      if (!isComplete && !isLoading) {
        var sentinelEl = document.getElementById('eip-infinite-sentinel');
        if (sentinelEl) {
          var rect = sentinelEl.getBoundingClientRect();
          if (rect.top < window.innerHeight + 400) {
            loadNextBatch();
            requestAnimationFrame(fillViewport);
          }
        }
      }
    });
  });
</script>
